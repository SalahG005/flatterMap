<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    #map { width: 100vw; height: 100vh; background: #f8f1e9; }

    .marker-icon {
      width: 36px; height: 36px; border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex; align-items: center; justify-content: center;
      border: 2px solid white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .marker-icon span { transform: rotate(45deg); font-size: 16px; }

    .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; }
    .leaflet-popup-content { margin: 0; }
    .popup-box { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-width: 180px; }
    .popup-img { width: 100%; height: 100px; object-fit: cover; background: #E6CCB2; }
    .popup-body { padding: 10px 12px; }
    .popup-name { font-size: 14px; font-weight: 700; color: #3D2B1F; margin-bottom: 2px; }
    .popup-meta { font-size: 11px; color: #777; margin-bottom: 4px; text-transform: capitalize; }
    .popup-score { font-size: 12px; color: #d4a373; font-weight: 600; margin-bottom: 8px; }
    .popup-btn {
      display: block; width: 100%; padding: 8px;
      background: #C45B38; color: white; border: none;
      border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: 600;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script>
  const MAPBOX_TOKEN = "pk.eyJ1IjoiZ25hb3Vpc2FsYWgiLCJhIjoiY21vZGtsdGhvMDNkbjJwczYzcXVnbHBlYiJ9.NluIh57i5SK8hwwksmf6SQ";
  const FIREBASE_PROJECT = "flatterflowsalah";
  const FIREBASE_APIKEY = "AIzaSyDWY8zouKK1wJwGmFIJDudpQls7Q0eFO0A";

  const params = new URLSearchParams(window.location.search);
  const filterCat = params.get('cat') || 'all';

  const map = L.map('map', { zoomControl: false }).setView([36.82, 10.18], 12);

  L.tileLayer(
    'https://api.mapbox.com/styles/v1/mapbox/streets-v12/tiles/{z}/{x}/{y}?access_token=' + MAPBOX_TOKEN,
    { attribution: '© Mapbox', tileSize: 512, zoomOffset: -1, maxZoom: 19 }
  ).addTo(map);

  let categoryStyles = {};

  async function loadStyles() {
    try {
      const url = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT}/databases/(default)/documents/categories?key=${FIREBASE_APIKEY}`;
      const res = await fetch(url);
      const data = await res.json();

      (data.documents || []).forEach(doc => {
        const f = doc.fields;
        const name = f.name?.stringValue.toLowerCase().trim();
        categoryStyles[name] = {
          emoji: f.emoji?.stringValue || '📍',
          color: f.color?.stringValue || '#C45B38'
        };
      });

      // 🔍 DEBUG: See all category keys loaded from Firebase
      console.log("✅ Categories loaded:", JSON.stringify(categoryStyles, null, 2));

    } catch (e) {
      console.error("❌ Error loading categories:", e);
    }
  }

  function makeIcon(catName) {
    const key = (catName || '').toLowerCase().trim();
    const style = categoryStyles[key] || { emoji: '📍', color: '#999' };

    // 🔍 DEBUG: See if the key matches a category
    if (!categoryStyles[key]) {
      console.warn(`⚠️ No style found for category: "${key}" — using default gray`);
    }

    return L.divIcon({
      className: '',
      html: `<div class="marker-icon" style="background: ${style.color}"><span>${style.emoji}</span></div>`,
      iconSize: [36, 36],
      iconAnchor: [18, 36],
      popupAnchor: [0, -38]
    });
  }

  async function loadSpots() {
    await loadStyles();

    try {
      const url = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT}/databases/(default)/documents/spots?key=${FIREBASE_APIKEY}&pageSize=200`;
      const res = await fetch(url);
      const data = await res.json();

      (data.documents || []).forEach(doc => {
        const f = doc.fields;
        const spotCat = f.category?.stringValue || 'Default';

        if (f.status?.stringValue !== 'validated') return;

        if (filterCat.toLowerCase() !== 'all' && spotCat.toLowerCase() !== filterCat.toLowerCase()) return;

        const lat = f.lat?.doubleValue || parseFloat(f.lat?.integerValue || 0);
        const lng = f.lng?.doubleValue || parseFloat(f.lng?.integerValue || 0);

        // 🔍 DEBUG: See what category each spot has
        console.log(`📍 Spot: "${f.name?.stringValue}" → category: "${spotCat}"`);

        if (lat && lng) {
          addMarker({
            id: doc.name.split('/').pop(),
            name: f.name?.stringValue || 'Unknown Spot',
            category: spotCat,
            city: f.city?.stringValue || '',
            score: (f.score?.doubleValue || 0),
            photo: f.photo_url?.stringValue || '',
            lat, lng
          });
        }
      });
    } catch (e) {
      console.error("❌ Error loading spots:", e);
    }
  }

  function addMarker(s) {
    const popupHtml = `
      <div class="popup-box">
        ${s.photo ? `<img class="popup-img" src="${s.photo}" onerror="this.style.display='none'">` : ''}
        <div class="popup-body">
          <div class="popup-name">${s.name}</div>
          <div class="popup-meta">${s.city} • ${s.category}</div>
          <div class="popup-score">★ ${Number(s.score).toFixed(1)}</div>
          <button class="popup-btn" onclick="openSpot('${s.id}')">Voir le spot</button>
        </div>
      </div>`;

    L.marker([s.lat, s.lng], { icon: makeIcon(s.category) })
      .addTo(map)
      .bindPopup(popupHtml, { maxWidth: 220 });
  }

  function openSpot(spotId) {
    try {
      window.flutter_inappwebview.callHandler('openSpot', spotId);
    } catch(e) {
      window.location.href = '93aydaasal://spot/' + spotId;
    }
  }

  loadSpots();
</script>
</body>
</html>
