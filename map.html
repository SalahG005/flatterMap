<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    #map { width: 100vw; height: 100vh; }

    .marker-icon {
      width: 36px; height: 36px; border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex; align-items: center; justify-content: center;
      border: 2px solid white;
    }
    .marker-icon span { transform: rotate(45deg); font-size: 14px; }
    .cat-restaurant { background: #C45B38; }
    .cat-plage      { background: #185FA5; }
    .cat-cafe       { background: #854F0B; }
    .cat-activite   { background: #3B6D11; }

    .leaflet-popup-content-wrapper {
      border-radius: 12px; padding: 0; overflow: hidden;
    }
    .leaflet-popup-content { margin: 0; }
    .popup-box { font-family: sans-serif; min-width: 180px; }
    .popup-img { width: 100%; height: 90px; object-fit: cover; background: #E6CCB2; }
    .popup-body { padding: 10px 12px; }
    .popup-name { font-size: 14px; font-weight: 600; color: #3D2B1F; margin-bottom: 2px; }
    .popup-meta { font-size: 11px; color: #888; margin-bottom: 4px; }
    .popup-score { font-size: 12px; color: #C45B38; font-weight: 600; margin-bottom: 8px; }
    .popup-btn {
      display: block; width: 100%; padding: 7px;
      background: #C45B38; color: white; border: none;
      border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: 500;
    }
  </style>
</head>
<body>
<div id="map"></div>
<script>
  // ── REMPLACE CES DEUX VALEURS ──────────────────────
  const MAPBOX_TOKEN    = "pk.eyJ1IjoiZ25hb3Vpc2FsYWgiLCJhIjoiY21vZGtsdGhvMDNkbjJwczYzcXVnbHBlYiJ9.NluIh57i5SK8hwwksmf6SQ";
  const FIREBASE_PROJECT = "TON_PROJECT_ID";
  const FIREBASE_APIKEY  = "TON_WEB_API_KEY";
  // ───────────────────────────────────────────────────

  const params   = new URLSearchParams(window.location.search);
  const category = params.get('cat') || 'all';

  const map = L.map('map').setView([36.82, 10.18], 12);

  // ✅ Mapbox tiles — fonctionne sans serveur, sans referer
  L.tileLayer(
    'https://api.mapbox.com/styles/v1/mapbox/streets-v12/tiles/{z}/{x}/{y}?access_token=' + MAPBOX_TOKEN,
    {
      attribution: '© Mapbox © OpenStreetMap',
      tileSize: 512,
      zoomOffset: -1,
      maxZoom: 19
    }
  ).addTo(map);

  const icons = {
    restaurant: { emoji: '🍴', cls: 'cat-restaurant' },
    plage:      { emoji: '🏖', cls: 'cat-plage'      },
    cafe:       { emoji: '☕', cls: 'cat-cafe'       },
    activite:   { emoji: '⭐', cls: 'cat-activite'   },
  };

  function makeIcon(cat) {
    const c = icons[cat] || { emoji: '📍', cls: 'cat-restaurant' };
    return L.divIcon({
      className: '',
      html: `<div class="marker-icon ${c.cls}"><span>${c.emoji}</span></div>`,
      iconSize: [36, 36],
      iconAnchor: [18, 36],
      popupAnchor: [0, -38]
    });
  }

  async function loadSpots() {
    // ── TEST LOCAL : spots codés en dur ──────────────
    // Quand Firebase sera connecté, supprime ce bloc
    // et décommente la partie fetch() en dessous

      { id: '1', name: 'Le Baroque',    category: 'restaurant', city: 'Tunis',         score: 8.2, lat: 36.7992, lng: 10.1708, photo: '' },
      { id: '2', name: 'Café Saf-Saf', category: 'cafe',       city: 'Sidi Bou Said', score: 9.1, lat: 36.8701, lng: 10.3418, photo: '' },
      { id: '3', name: 'Plage Goulette',category: 'plage',      city: 'La Goulette',   score: 7.5, lat: 36.8185, lng: 10.3050, photo: '' },
      { id: '4', name: 'Dar El Jeld',  category: 'restaurant', city: 'Tunis',         score: 9.4, lat: 36.7985, lng: 10.1700, photo: '' },
      { id: '5', name: 'Escape Room',  category: 'activite',   city: 'Tunis',         score: 8.0, lat: 36.8436, lng: 10.1953, photo: '' },
    ];

    testSpots
      .filter(s => category === 'all' || s.category === category)
      .forEach(s => addMarker(s));

    // ── FIREBASE RÉEL : décommenter quand prêt ───────

    const res  = await fetch(url);

    (data.documents || []).forEach(doc => {
      const f   = doc.fields;
      const cat = f.category?.stringValue;
      if (f.status?.stringValue !== 'validated') return;
      if (category !== 'all' && cat !== category) return;
      const lat = f.location?.geoPointValue?.latitude;
      const lng = f.location?.geoPointValue?.longitude;

      addMarker({
        id:       doc.name.split('/').pop(),
        name:     f.name?.stringValue || '',

        score:    (f.score?.doubleValue || 0),
        photo:    f.photo_url?.stringValue || '',
        lat, lng
      });
    });
    */
  }

  function addMarker(s) {
    const popup = `
      <div class="popup-box">
        ${s.photo ? `<img class="popup-img" src="${s.photo}" onerror="this.style.display='none'">` : ''}
        <div class="popup-body">
          <div class="popup-name">${s.name}</div>
          <div class="popup-meta">${s.city} · ${s.category}</div>
          <div class="popup-score">★ ${Number(s.score).toFixed(1)}</div>
          <button class="popup-btn" onclick="openSpot('${s.id}')">Voir le spot</button>
        </div>
      </div>`;

    L.marker([s.lat, s.lng], { icon: makeIcon(s.category) })
      .addTo(map)
      .bindPopup(popup, { maxWidth: 220 });
  }

  function openSpot(spotId) {
    try {
      window.flutter_inappwebview.callHandler('openSpot', spotId);
    } catch(e) {
      window.location.href = 'flatterflow://spot/' + spotId;
    }
  }

  loadSpots();
</script>
</body>
</html>
